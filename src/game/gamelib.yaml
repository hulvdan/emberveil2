particles: # {  ###
  - type: INVALID
  - type: DIAMOND_BIG
    duration_seconds: 0.4
    disable_rotation: true
    scale_x: 0.9
    scale_y: 0.9
    scale_target: 1.1
    fades_in: true
    variations:
      - texture_ids:
          - _game_particle_star
    render_function_name: COMMON
  - type: STAR
    duration_seconds: 0.5
    disable_rotation: true
    scale_x: 0.3
    scale_y: 0.3
    scale_target: 1.2
    fades_in: true
    variations:
      - texture_ids:
          - _game_particle_star
    render_function_name: COMMON
  - type: CIRCLE
    duration_seconds: 0.8
    disable_rotation: true
    scale_x: 0.3
    scale_y: 0.3
    scale_target: 30
    # scale_target_x: 1.3
    # scale_target_y: 1.3
    fades_in: true
    # color: 0xfbb954af
    color: 0xfbff867f
    variations:
      - texture_ids:
          - _game_feedback_circle
# }

colors:
  - type: INVALID
